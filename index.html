<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ふえる軍団！ゲートアーミーの公式サポートサイト">
  <title>ふえる軍団！ゲートアーミー</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #fff; background: radial-gradient(circle at 50% 0%, #263b65 0, #111827 44%, #080b12 100%); }
    main { width: min(680px, calc(100% - 40px)); padding: 64px 0; text-align: center; }
    .eyebrow { margin: 0 0 12px; color: #fbbf24; font-size: .8rem; font-weight: 800; letter-spacing: .18em; }
    h1 { margin: 0; font-size: clamp(2rem, 8vw, 4.5rem); line-height: 1.08; }
    .lead { margin: 24px auto 0; max-width: 34em; color: #cbd5e1; font-size: 1.05rem; line-height: 1.8; }
    nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 36px; }
    a { display: inline-flex; align-items: center; min-height: 48px; padding: 0 20px; border: 1px solid #64748b; border-radius: 999px; color: #fff; font-weight: 700; text-decoration: none; }
    a.primary { border-color: #f59e0b; color: #111827; background: #fbbf24; }
    a:hover { filter: brightness(1.1); }
    footer { margin-top: 56px; color: #94a3b8; font-size: .8rem; }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">GATE ARMY</p>
    <h1>ふえる軍団！<br>ゲートアーミー</h1>
    <p class="lead">ゲートをくぐって軍団を増やし、武器を強化して敵の本陣へ突撃。指一本で遊べる爽快な増殖バトルゲームです。</p>
    <nav aria-label="関連リンク">
      <a class="primary" href="https://apps.apple.com/jp/app/id6790040203">App Storeで見る</a>
      <a href="https://note.com/tukareno/n/n870c45e6adf4">プライバシーポリシー・サポート</a>
    </nav>
    <footer>&copy; 2026 Ryoya Izawa</footer>
  </main>
</body>
</html>
